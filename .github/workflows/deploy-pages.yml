name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  actions: write
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout latest main branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
      - name: Remove stale Pages artifacts from earlier attempts
        # Re-running only the failed deploy job leaves the previous attempt's
        # "github-pages" artifact behind; actions/deploy-pages then errors with
        # "Multiple artifacts named github-pages". Clear any leftover first so
        # re-runs stay safe.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id' |
          while read -r id; do
            [ -n "$id" ] || continue
            echo "Deleting stale github-pages artifact $id"
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
          done
      - name: Assemble static site
        run: |
          mkdir -p _site/data
          cp index.html app.js safe-url.js progress.js styles.css _site/
          cp -R assets _site/assets
          node tools/build-site-data.js _site/data
          touch _site/.nojekyll
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
