name: Update anime episodes

on:
  schedule:
    - cron: '17 23 * * *' # 06:17 Asia/Bangkok (UTC+7)
    - cron: '17 5 * * *'  # 12:17 Asia/Bangkok (UTC+7)
    - cron: '17 16 * * *' # 23:17 Asia/Bangkok (UTC+7)
  workflow_dispatch:
    inputs:
      backfill:
        description: Scan official channel uploads back to 1 January
        required: false
        type: boolean
        default: false

concurrency:
  group: anime-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Sync current-year TV catalog from Jikan
        run: node tools/update-jikan.js
      - name: Update YouTube episode data
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node tools/update-youtube.js
      - name: Discover episodes from official channel uploads
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          BACKFILL: ${{ inputs.backfill || 'false' }}
        run: node tools/discover-youtube.js
      - name: Update Crunchyroll + Bilibili TV + Netflix availability from AniList
        run: node tools/update-streaming-platforms.js
      - name: Validate updater behavior
        run: node --test tools/*.test.js
      - name: Commit changed data
        run: |
          git config user.name "anime-update-bot"
          git config user.email "anime-update-bot@users.noreply.github.com"
          git add data/anime.json data/anime.js data/youtube-discovery-state.json data/youtube-candidates.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "chore: update latest anime episodes"
          for attempt in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push rejected (attempt $attempt); rebasing onto latest main..."
            git fetch origin main
            # data/* files are regenerated wholesale each run, so a plain
            # rebase always conflicts on them. Resolve in favour of this run's
            # freshly generated version instead of wedging on merge markers.
            git rebase -X theirs origin/main || git rebase --abort
          done
          git push

  deploy:
    needs: update
    permissions:
      actions: write
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-pages.yml
